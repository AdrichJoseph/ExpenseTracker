services:
  # ── SQL Server container ─────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: expensetracker-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Local_Dev_P@ssword_123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Local_Dev_P@ssword_123' -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  # ── API container ────────────────────────────────────────
  api:
    build: .
    container_name: expensetracker-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Server=db,1433;Database=ExpenseTracker;User Id=sa;Password=Local_Dev_P@ssword_123;TrustServerCertificate=True"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver-data:
